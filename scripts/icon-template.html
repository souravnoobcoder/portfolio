<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; }
      html { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      body {
        background: #0a0a0b;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: "SF Mono", ui-monospace, Menlo, monospace;
        overflow: hidden;
      }
      /* radial accent glow keeps the dark icon from looking flat */
      .glow {
        position: absolute;
        inset: 0;
        background: radial-gradient(closest-side at 50% 38%, rgba(52, 211, 153, 0.28), transparent 70%);
      }
      .sr {
        position: relative;
        font-weight: 700;
        font-size: 44vmin;
        letter-spacing: -2vmin;
        background: linear-gradient(125deg, #34d399, #2dd4bf);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
      }
    </style>
  </head>
  <body>
    <div class="glow"></div>
    <div class="sr">SR</div>
  </body>
</html>
